{{- $title := .Params.seoTitle | default .Title -}}
{{- $description := .Params.description | default .Summary | default site.Params.siteDescription -}}
{{- $image := cond .Params.ogImage (.Params.ogImage | absURL) (site.Params.defaultImage | absURL) -}}

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{ $title }}",
  "description": "{{ $description }}",
  "image": "{{ $image }}",
  "author": {
    "@type": "Person",
    "name": "Himel Nag Rana"
  },
  "publisher": {
    "@type": "Person",
    "name": "Himel Nag Rana"
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  },
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}"
}
</script>
